# SonarQube project config for terminal-talk.
#
# Runs against a local SonarQube Community Edition instance at
# http://localhost:9000 (Docker container "sonarqube"). To scan:
#
#   1. Ensure SonarQube is up:  curl http://localhost:9000/api/system/status
#   2. Export token:            export SONAR_TOKEN=$(cat .sonarqube-token)
#   3. Run scanner:             npm run sonar
#
# The token file is gitignored. CI does NOT run SonarQube — self-hosted
# at localhost:9000 can't be reached from GitHub Actions runners.
# Scans are invoked manually / before release as part of v0.4 quality
# tier (see Claude Assesments/v0.4-QUALITY-ULTRAPLAN.md).

sonar.projectKey=terminal-talk
sonar.projectName=Terminal Talk
sonar.host.url=http://localhost:9000

# Sources we actually author. Tests go to sonar.tests (separate key)
# so coverage + duplication analysis treats them differently.
sonar.sources=app,scripts,hooks,docs/ui-kit
sonar.tests=tests,scripts/run-tests.cjs

# Exclusions:
#   - node_modules: transitively downloaded, not ours
#   - tests/baselines: PNG fixtures, not code
#   - docs/app-mirror: generated duplicate of app/ for Pages (sync'd by
#     scripts/sync-app-mirror.cjs; analyzing the duplicate produces
#     duplicate findings)
#   - Generated files from scripts/generate-tokens-css.cjs
#   - ASCII banners and other non-code data files
sonar.exclusions=**/node_modules/**,tests/baselines/**,docs/app-mirror/**,app/lib/tokens-window.js,app/lib/palette-classes.css,docs/ui-kit/tokens.mjs,docs/colors_and_type.css,app/lib/voices-window.js,docs/**/*.png,docs/**/*.jpg,scripts/run-tests.cjs

# Coverage report (produced by `npm run test:coverage` which writes
# coverage/lcov.info). Scanner picks it up if the file exists.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding / languages
sonar.sourceEncoding=UTF-8
