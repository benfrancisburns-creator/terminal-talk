<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Wordmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0f1014;min-height:150px;display:flex;align-items:center;justify-content:center;font-family:var(--tt-font-ui)}
  .stage{padding:30px 40px;display:flex;align-items:center;gap:24px}
  .mark{display:inline-flex;align-items:center;gap:12px;padding:10px 20px 10px 16px;background:var(--tt-surface-bar);border:1px solid var(--tt-border-surface);border-radius:var(--tt-radius-pill);backdrop-filter:var(--tt-blur);box-shadow:var(--tt-shadow-bar)}
  .mark .dot{width:18px;height:18px;border-radius:50%;background:var(--tt-green)}
  .mark .name{font-family:var(--tt-font-mono);color:var(--tt-fg-1);font-size:18px;letter-spacing:0.02em}
  .mark .cursor{display:inline-block;width:9px;height:18px;background:var(--tt-fg-3);margin-left:4px;animation:bl 1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
  .caption{font-size:11px;color:var(--tt-fg-5);letter-spacing:var(--tt-tracking-caps);text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="mark"><div class="dot"></div><span class="name">terminal talk</span><span class="cursor"></span></div>
  <div class="caption">wordmark · pill surface · cascadia mono · brand green dot</div>
</div>
</body>
</html>
