<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0f1014;font-family:var(--tt-font-ui);color:#fff}
  .stage{padding:18px 22px}
  .cap{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:10px}
  .block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:4px 8px;margin-bottom:6px}
  .row{display:grid;grid-template-columns:18px 24px 90px 1fr 180px;gap:10px;align-items:center;padding:4px 0;font-size:12px}
  .chev{width:18px;height:18px;border-radius:50%;background:transparent;border:none;color:rgba(255,255,255,0.5);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .chev:hover{background:rgba(255,255,255,0.08);color:#fff}
  .sw{width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,0.1)}
  .short{font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.55);font-size:11px}
  input[type=text],select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color-scheme:dark}
</style>
</head>
<body>
<div class="stage">
  <div class="cap">Sessions table row — chevron · swatch · short id · label · colour select</div>
  <div class="block">
    <div class="row">
      <button class="chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></button>
      <div class="sw" style="background:#4ade80"></div>
      <div class="short">abcd1234</div>
      <input type="text" value="Frontend">
      <select><option>Green</option></select>
    </div>
  </div>
  <div class="block">
    <div class="row">
      <button class="chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></button>
      <div class="sw" style="background:linear-gradient(to bottom,#ffa726 50%,#60a5fa 50%)"></div>
      <div class="short">a08f2b71</div>
      <input type="text" value="Auth API">
      <select><option>Orange / Blue — top/bottom</option></select>
    </div>
  </div>
</div>
</body>
</html>
