<!--
  Script load order for the kit demo (DO NOT reorder):
    1. React (umd production build) — defines window.React
    2. ReactDOM (umd production build) — defines window.ReactDOM; depends on (1)
    3. Babel standalone — defines window.Babel, transpiles <script type="text/babel"> at runtime
    4. Palette <script type="module"> — imports from ./tokens.mjs (which
       reads app/lib/tokens.json at build time) and assigns
       window.TTPalette so the non-module JSX components see it
    5. Component modules (IconButton/Dot/Scrubber/etc., type="text/babel") —
       use window.React + window.TTPalette
    6. App boot (type="text/babel") — ReactDOM.createRoot(...) into #root

  The palette script is an ES module. Modules defer by default, so
  components (type="text/babel", not modules) will actually execute
  BEFORE the palette module finishes. The JSX components read
  window.TTPalette lazily inside their render functions, so the
  lazy-read is what makes this ordering safe. A future component that
  reads TTPalette at MODULE TOP LEVEL will see undefined — make it
  read inside the component body instead.

  React is loaded from the production build (~140 KB combined vs ~1.3 MB
  dev). SRI hashes are intentionally omitted — regenerate before shipping:
     curl -sL https://unpkg.com/react@18.3.1/umd/react.production.min.js \
       | openssl dgst -sha384 -binary | openssl base64 -A
  Babel standalone stays as-is (it's a compiler, not a runtime; no
  production build exists).
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Palette: imported from canonical tokens (app/lib/tokens.json via tokens.mjs).
     Builds window.TTPalette synchronously so JSX components below see it on
     first render. The previous inline IIFE drifted from the product on 9 of
     16 split arrangements; this version cannot drift because the same JSON
     drives the renderer. -->
<script type="module">
  import { PALETTE } from './tokens.mjs';
  const { BASE_COLOURS, NEUTRAL_COLOUR, PALETTE_SIZE, COLOUR_NAMES, HSPLIT_PARTNER, VSPLIT_PARTNER } = PALETTE;

  function arrangementForIndex(idx) {
    const i = ((idx % PALETTE_SIZE) + PALETTE_SIZE) % PALETTE_SIZE;
    if (i < 8)  return { kind: 'solid',  colours: [BASE_COLOURS[i]] };
    if (i < 16) { const p = i - 8;  return { kind: 'hsplit', colours: [BASE_COLOURS[p], BASE_COLOURS[HSPLIT_PARTNER[p]]] }; }
    const p = i - 16; return { kind: 'vsplit', colours: [BASE_COLOURS[p], BASE_COLOURS[VSPLIT_PARTNER[p]]] };
  }
  function backgroundForArrangement(arr) {
    if (!arr) return NEUTRAL_COLOUR;
    const c = arr.colours;
    if (arr.kind === 'solid')  return c[0];
    if (arr.kind === 'hsplit') return `linear-gradient(to bottom, ${c[0]} 50%, ${c[1]} 50%)`;
    if (arr.kind === 'vsplit') return `linear-gradient(to right,  ${c[0]} 50%, ${c[1]} 50%)`;
    return c[0];
  }
  function primaryColourForArrangement(arr) { return arr && arr.colours ? arr.colours[0] : NEUTRAL_COLOUR; }
  function arrangementLabel(i) {
    if (i < 8)  return COLOUR_NAMES[i];
    if (i < 16) { const p = i - 8;  return `${COLOUR_NAMES[p]} / ${COLOUR_NAMES[HSPLIT_PARTNER[p]]} — top/bottom`; }
    const p = i - 16; return `${COLOUR_NAMES[p]} / ${COLOUR_NAMES[VSPLIT_PARTNER[p]]} — left/right`;
  }
  function hashToIndex(s) { let n = 0; for (const c of (s || '')) n += c.charCodeAt(0); return n % PALETTE_SIZE; }
  window.TTPalette = { arrangementForIndex, backgroundForArrangement, primaryColourForArrangement, arrangementLabel, hashToIndex, PALETTE_SIZE };
</script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="IconButton.jsx"></script>
<script type="text/babel" src="Dot.jsx"></script>
<script type="text/babel" src="Scrubber.jsx"></script>
<script type="text/babel" src="Toolbar.jsx"></script>
<script type="text/babel" src="AsciiBanner.jsx"></script>
<script type="text/babel" src="SessionsTable.jsx"></script>
<script type="text/babel" src="SettingsPanel.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function shortHex() {
  return Array.from({length:8}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
}

function demoInitialSessions() {
  return {
    'abcd1234': { index: 3,  label: 'Frontend',  session_id: 'abcd1234', pinned: true,  last_seen: Date.now()/1000 },
    'a08f2b71': { index: 12, label: 'Auth API',  session_id: 'a08f2b71', pinned: false, last_seen: Date.now()/1000 },
    '7e5c9a04': { index: 18, label: '',          session_id: '7e5c9a04', pinned: false, last_seen: Date.now()/1000, voice: 'en-US-AriaNeural' },
  };
}

// S5 — seeded demo states, one per section of mocks-annotated.html.
// URL-param `?seed=NAME` picks which state we boot into. `?chrome=0`
// hides the dev controls at the bottom (add-fake-clip, clear queue,
// collapse panel) so mocks-annotated iframes render cleanly.
const SEEDS = {
  idle: {
    settingsOpen: false,
    sessions: {},
    queue: [],
    currentId: null,
    playing: false,
    currentTime: 0,
  },
  'three-sessions': {
    settingsOpen: false,
    sessions: {
      'abcd1234': { index: 0,  label: 'Terminal A', session_id: 'abcd1234', pinned: true,  last_seen: Date.now()/1000 },
      'a08f2b71': { index: 2,  label: 'Terminal B', session_id: 'a08f2b71', pinned: true,  last_seen: Date.now()/1000 },
      '7e5c9a04': { index: 3,  label: 'Terminal C', session_id: '7e5c9a04', pinned: true,  last_seen: Date.now()/1000 },
    },
    // A A A  —  B B B  —  C C
    queue: [
      { id: 'c1', short: 'abcd1234', paletteIndex: 0,  clip: false, heard: false, mtime: Date.now()-30000, duration: 64 },
      { id: 'c2', short: 'abcd1234', paletteIndex: 0,  clip: false, heard: false, mtime: Date.now()-28000, duration: 22 },
      { id: 'c3', short: 'abcd1234', paletteIndex: 0,  clip: false, heard: false, mtime: Date.now()-26000, duration: 15 },
      { id: 'c4', short: 'a08f2b71', paletteIndex: 2,  clip: false, heard: false, mtime: Date.now()-22000, duration: 30 },
      { id: 'c5', short: 'a08f2b71', paletteIndex: 2,  clip: false, heard: false, mtime: Date.now()-20000, duration: 44 },
      { id: 'c6', short: 'a08f2b71', paletteIndex: 2,  clip: false, heard: false, mtime: Date.now()-18000, duration: 12 },
      { id: 'c7', short: '7e5c9a04', paletteIndex: 3,  clip: false, heard: false, mtime: Date.now()-14000, duration: 48 },
      { id: 'c8', short: '7e5c9a04', paletteIndex: 3,  clip: false, heard: false, mtime: Date.now()-12000, duration: 26 },
    ],
    currentId: 'c1',
    playing: true,
    currentTime: 12,
  },
  'mixed-states': {
    settingsOpen: false,
    sessions: {
      'abcd1234': { index: 0, label: 'Terminal A', session_id: 'abcd1234', pinned: true, last_seen: Date.now()/1000 },
      'a08f2b71': { index: 2, label: 'Terminal B', session_id: 'a08f2b71', pinned: true, last_seen: Date.now()/1000 },
      '7e5c9a04': { index: 3, label: 'Terminal C', session_id: '7e5c9a04', pinned: true, last_seen: Date.now()/1000 },
      'deadbeef': { index: 4, label: 'Claude',     session_id: 'deadbeef', pinned: true, last_seen: Date.now()/1000 },
    },
    // 2 heard + 1 playing red  —  2 queued yellow  —  2 queued green  —  1 J-clip blue
    queue: [
      { id: 'c1', short: 'abcd1234', paletteIndex: 0, clip: false, heard: true,  mtime: Date.now()-30000, duration: 64 },
      { id: 'c2', short: 'abcd1234', paletteIndex: 0, clip: false, heard: true,  mtime: Date.now()-28000, duration: 22 },
      { id: 'c3', short: 'abcd1234', paletteIndex: 0, clip: false, heard: false, mtime: Date.now()-26000, duration: 65 },
      { id: 'c4', short: 'a08f2b71', paletteIndex: 2, clip: false, heard: false, mtime: Date.now()-22000, duration: 30 },
      { id: 'c5', short: 'a08f2b71', paletteIndex: 2, clip: false, heard: false, mtime: Date.now()-20000, duration: 44 },
      { id: 'c6', short: '7e5c9a04', paletteIndex: 3, clip: false, heard: false, mtime: Date.now()-14000, duration: 48 },
      { id: 'c7', short: '7e5c9a04', paletteIndex: 3, clip: false, heard: false, mtime: Date.now()-12000, duration: 26 },
      { id: 'c8', short: 'deadbeef', paletteIndex: 4, clip: true,  heard: false, mtime: Date.now()-6000,  duration: 18 },
    ],
    currentId: 'c3',
    playing: true,
    currentTime: 22,
  },
  'settings-panel': {
    settingsOpen: true,
    sessions: demoInitialSessions(),
    expanded: new Set(['7e5c9a04']),
    queue: [
      { id: 'c1', short: 'abcd1234', paletteIndex: 3,  clip: false, heard: false, mtime: Date.now()-20000, duration: 130 },
      { id: 'c2', short: 'a08f2b71', paletteIndex: 12, clip: false, heard: false, mtime: Date.now()-15000, duration: 90 },
      { id: 'c3', short: '7e5c9a04', paletteIndex: 18, clip: false, heard: true,  mtime: Date.now()-10000, duration: 74 },
    ],
    currentId: 'c1',
    playing: true,
    currentTime: 28,
  },
  'snapped-top': {
    settingsOpen: false,
    sessions: {
      'abcd1234': { index: 0, label: '', session_id: 'abcd1234', pinned: true, last_seen: Date.now()/1000 },
      'a08f2b71': { index: 4, label: '', session_id: 'a08f2b71', pinned: true, last_seen: Date.now()/1000 },
    },
    queue: [
      { id: 'c1', short: 'abcd1234', paletteIndex: 0, clip: false, heard: true,  mtime: Date.now()-30000, duration: 32 },
      { id: 'c2', short: 'abcd1234', paletteIndex: 0, clip: false, heard: false, mtime: Date.now()-28000, duration: 18 },
      { id: 'c3', short: 'a08f2b71', paletteIndex: 4, clip: false, heard: false, mtime: Date.now()-22000, duration: 72 },
      { id: 'c4', short: 'a08f2b71', paletteIndex: 4, clip: false, heard: false, mtime: Date.now()-20000, duration: 27 },
      { id: 'c5', short: 'a08f2b71', paletteIndex: 4, clip: false, heard: false, mtime: Date.now()-18000, duration: 14 },
    ],
    currentId: 'c3',
    playing: true,
    currentTime: 45,
  },
};
const URL_PARAMS = new URLSearchParams(location.search);
const SEED_NAME  = URL_PARAMS.get('seed');
const SEED       = (SEED_NAME && SEEDS[SEED_NAME]) ? SEEDS[SEED_NAME] : null;
const SHOW_CHROME = URL_PARAMS.get('chrome') !== '0';

function App() {
  const [settingsOpen, setSettingsOpen] = useState(SEED ? SEED.settingsOpen : true);
  const [speed, setSpeed] = useState(1.25);
  const [sessions, setSessions] = useState(SEED ? SEED.sessions : demoInitialSessions());
  const [expanded, setExpanded] = useState(() => SEED && SEED.expanded ? new Set(SEED.expanded) : new Set(['7e5c9a04']));
  const [queue, setQueue] = useState(() => SEED ? SEED.queue : [
    { id: 'c1', short: 'abcd1234', paletteIndex: 3,  clip: false, heard: false, mtime: Date.now()-20000, duration: 130 },
    { id: 'c2', short: 'a08f2b71', paletteIndex: 12, clip: false, heard: false, mtime: Date.now()-15000, duration: 90 },
    { id: 'c3', short: 'abcd1234', paletteIndex: 3,  clip: true,  heard: false, mtime: Date.now()-10000, duration: 18 },
    { id: 'c4', short: '7e5c9a04', paletteIndex: 18, clip: false, heard: true,  mtime: Date.now()-5000,  duration: 74 },
  ]);
  const [currentId, setCurrentId] = useState(SEED ? SEED.currentId : 'c2');
  const [playing, setPlaying] = useState(SEED ? SEED.playing : true);
  const [currentTime, setCurrentTime] = useState(SEED ? SEED.currentTime : 41);

  // Tick playback when playing
  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => {
      setCurrentTime(t => {
        const cur = queue.find(c => c.id === currentId);
        if (!cur) return t;
        if (t >= cur.duration) { setPlaying(false); return 0; }
        return t + 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [playing, currentId, queue]);

  const actions = {
    playPause: () => setPlaying(p => !p),
    back10: () => setCurrentTime(t => Math.max(0, t - 10)),
    fwd10: () => setCurrentTime(t => t + 10),
    userPlay: (id) => {
      setCurrentId(id); setCurrentTime(0); setPlaying(true);
      setQueue(q => q.map(c => c.id === id ? { ...c, heard: true } : c));
    },
    remove: (id) => setQueue(q => q.filter(c => c.id !== id)),
    clearPlayed: () => setQueue(q => q.filter(c => !c.heard)),
    scrubPreview: (v) => {
      const cur = queue.find(c => c.id === currentId); if (!cur) return;
      setCurrentTime((v/1000) * cur.duration);
    },
    seek: (v) => { const cur = queue.find(c => c.id === currentId); if (!cur) return; setCurrentTime((v/1000) * cur.duration); },
    toggleSettings: () => setSettingsOpen(o => !o),
    hide: () => alert('(demo) would hide the toolbar'),
  };

  const addFakeClip = () => {
    const sessionKeys = Object.keys(sessions);
    const pick = sessionKeys[Math.floor(Math.random() * sessionKeys.length)];
    setQueue(q => [...q, {
      id: 'c' + (q.length + 1) + '-' + Math.random().toString(36).slice(2,5),
      short: pick, paletteIndex: sessions[pick].index,
      clip: Math.random() < 0.3, heard: false,
      mtime: Date.now(), duration: 30 + Math.floor(Math.random() * 120)
    }]);
  };

  const toggleExpand = (shortId) => setExpanded(e => {
    const n = new Set(e); n.has(shortId) ? n.delete(shortId) : n.add(shortId); return n;
  });
  const updateSession = (shortId, entry) => setSessions(s => ({ ...s, [shortId]: entry }));
  const removeSession = (shortId) => setSessions(s => {
    const next = { ...s }; delete next[shortId]; return next;
  });

  return (
    <div className="tt-demo-chrome">
      <Toolbar state={{ queue, currentId, currentTime, playing }} actions={actions} />
      {settingsOpen && (
        <SettingsPanel speed={speed} onSpeedChange={setSpeed}
                       sessions={sessions} expanded={expanded}
                       onToggleSession={toggleExpand} onUpdateSession={updateSession}
                       onRemoveSession={removeSession} />
      )}
      {SHOW_CHROME && (
        <>
          <div className="tt-demo-controls">
            <button onClick={addFakeClip}>＋ Add fake clip</button>
            <button onClick={() => { setQueue([]); setCurrentId(null); setPlaying(false); }}>Clear queue</button>
            <button onClick={() => setSettingsOpen(o => !o)}>{settingsOpen ? 'Collapse panel' : 'Expand panel'}</button>
          </div>
          <div className="tt-demo-caption">UI-kit recreation · not wired to real audio · click a dot to replay</div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
