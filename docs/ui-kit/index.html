<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Terminal Talk — UI Kit (D2-3: renderer-iframed)</title>
  <!--
    D2-3 — the kit is no longer a parallel React reimplementation.
    It loads the shipping app/renderer.js verbatim (relative path
    ../../app/renderer.js) with mock-ipc.js stubbing the IPC surface
    Electron normally provides via preload.

    D2-3b — the DOM itself is now fetched from app/index.html at
    runtime by kit-bootstrap.js, then spliced into this page. Any
    new element added to the product is inherited on next load.
    No drift possible.

    URL params:
      ?seed=<name>    idle | three-sessions | mixed-states |
                      settings-panel | snapped-top   (default: three-sessions)
      ?chrome=0       hides the demo controls bar (mocks-annotated
                      and components.html iframes use this)
  -->
  <link rel="stylesheet" href="../../app/styles.css">
  <link rel="stylesheet" href="../../app/lib/palette-classes.css">
  <link rel="stylesheet" href="kit-chrome.css">
</head>
<body>
  <script src="kit-bootstrap.js"></script>
</body>
</html>
