name: Feature request
description: Suggest an improvement or new capability.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the use case — a concrete "I was trying to X and couldn't" is much easier to evaluate than a bare "please add Y".

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's in the way today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea for *how* to solve it, share it here. Otherwise just leave this blank and let the discussion flow.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other tools that solve this differently.
