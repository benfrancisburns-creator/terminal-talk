name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pure-logic-tests:
    name: Pure JS tests (cross-platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Run logic-only test subset
        run: node scripts/run-tests.cjs --logic-only --verbose

  windows-full:
    name: Full harness (Windows + PowerShell + edge-tts)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install Python deps
        run: python -m pip install --quiet edge-tts openwakeword onnxruntime sounddevice numpy

      - name: Install Electron + Terminal Talk
        shell: pwsh
        run: |
          # Non-interactive install: no hooks, no statusline, no startup shortcut, no launch.
          $resp = "n`nn`nn`nn`n"
          $resp | .\install.ps1
        continue-on-error: false

      - name: Run full test harness
        run: node scripts/run-tests.cjs --verbose
