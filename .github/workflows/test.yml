name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny everything — each job grants only what it needs.
# Repo-read is enough for the test jobs (they don't push artefacts
# or comments). Hardens against action-malware that tries to exfiltrate
# secrets via GITHUB_TOKEN. Audit F2.
permissions:
  contents: read

# D2-8 — opt actions into Node 24 runtime ahead of GitHub's June 2nd 2026
# forced rollout. Stops the "Node.js 20 actions are deprecated" deprecation
# warning CI prints on every run today. Action *versions* are separately
# SHA-pinned below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Z2-2 — Node matrix catches regressions for users on older Node.
  # engines.node says >=18.0.0, so we run on all supported lines.
  pure-logic-tests:
    name: Pure JS tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '${{ matrix.node }}' }

      - name: Run logic-only test subset
        run: node scripts/run-tests.cjs --logic-only --verbose

  doc-drift:
    name: Doc-drift guard (stale phrases in docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }

      - name: Scan docs for stale phrases
        run: node scripts/check-doc-drift.cjs

  # v0.4 S2 — ESLint blocking gate.
  # Scans JS sources under app/, scripts/, docs/ui-kit/ against the
  # flat config at eslint.config.js. Zero-tolerance mode (--max-warnings=0)
  # — any warning OR error fails the job. Ignore list in the config
  # excludes generated files + the app-mirror copy + test baselines.
  lint:
    name: ESLint (zero warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }

      - name: Install dev dependencies
        # package-lock.json is gitignored here (single-dev repo) so npm ci
        # isn't available; matches coverage-job convention.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npx eslint app scripts docs/ui-kit eslint.config.js --max-warnings=0

  # v0.4 S1 — Knip blocking gate.
  # Cross-module dead-code + unused-dependency detector. Complements
  # ESLint's per-file no-unused-vars by walking the import graph and
  # catching orphaned exports that no one imports. Config in knip.json.
  knip:
    name: Knip (unused code + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }

      - name: Install dev dependencies
        run: npm install --no-audit --no-fund

      - name: Knip
        run: npx knip

  # v0.4 S3a — ruff blocking gate for Python sources.
  # Config in ruff.toml (target py310, rules E+F+W+I+B+C90+UP+SIM+PIE,
  # mccabe complexity threshold 15).
  python-lint:
    name: ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.1
        with: { python-version: '3.10' }

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check app/*.py

  # v0.4 S7.1a — npm audit (JS deps).
  # Fails on ANY known vulnerability (including low/moderate). The
  # repo ships zero at baseline; any Dependabot-introduced alert is
  # a real signal worth blocking on.
  npm-audit:
    name: npm audit (JS deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Audit
        # Root deps (devDependencies only — electron itself lives in
        # app/node_modules and gets audited separately if needed).
        run: npm audit --audit-level=low

  # v0.4 S7.1b — pip-audit (Python deps).
  # Audits requirements.txt's five pinned packages against the
  # OSV + PyPI advisory databases.
  #
  # Runs on windows-latest, NOT ubuntu-latest, because the pinned
  # deps have an inherent Linux resolution conflict:
  #   - onnxruntime==1.24.4 requires Python >=3.13 on Linux
  #   - openwakeword==0.6.0 transitively pulls tflite-runtime which
  #     requires Python <3.13 on Linux
  # The two are mutually exclusive on Linux, so pip-audit's dry-run
  # resolve fails no matter which Python version we pick. On Windows
  # both deps have wheels covering the same Python range (3.10-3.14)
  # because tflite-runtime isn't required on Windows (its platform
  # marker excludes it). Since Windows IS our actual target
  # platform, auditing there matches reality.
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.1
        with: { python-version: '3.13' }
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit
        run: pip-audit -r requirements.txt

  # v0.4 S7.2 — file-length gate.
  # Two thresholds: absolute ceiling (currently 3000 lines, will
  # ratchet down as the big-file refactor progresses) + per-file
  # baseline in file-length-baseline.json (each file can shrink or
  # stay flat; growing past its baseline requires an explicit bump
  # in the same PR via `npm run check:file-length:update`).
  file-length:
    name: File-length gate (ratchet-only-up)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }
      - name: Check
        run: node scripts/check-file-length.cjs

  # v0.4 S3b — PSScriptAnalyzer blocking gate for PowerShell sources.
  # Config in PSScriptAnalyzerSettings.psd1. Exclusions documented there.
  # Runs on windows-latest because PSScriptAnalyzer's Windows-specific
  # rules (e.g. on cmdlet availability) only work correctly under PS on
  # Windows.
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Analyze
        shell: pwsh
        run: |
          $files = @()
          Get-ChildItem -Path hooks,app,scripts -Include *.ps1,*.psm1 -Recurse | ForEach-Object { $files += $_.FullName }
          $files += (Resolve-Path install.ps1).Path
          $files += (Resolve-Path uninstall.ps1).Path
          $results = @()
          foreach ($f in $files) { $results += Invoke-ScriptAnalyzer -Path $f -Settings PSScriptAnalyzerSettings.psd1 }
          if ($results.Count -gt 0) {
            $results | Format-Table ScriptName, Line, RuleName, Severity, Message -AutoSize -Wrap
            exit 1
          }
          Write-Host "PSScriptAnalyzer: 0 findings"

  # v0.4 S5 — coverage floor (ratchet-only-up).
  # c8 runs the --logic-only subset and compares against thresholds
  # below the current baseline. Any drop fails CI. When coverage
  # improves, bump thresholds in the same PR to lock the gain.
  #
  # 2026-04-21: EX5 (CB palette toggle) added 2 renderer branches
  # that landed without unit test coverage (renderer is DOM-scoped;
  # covered by E2E not c8 logic-only). Branches ratcheted 68 -> 67.
  coverage:
    name: Coverage (c8) — blocking floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }
      - name: Install devDependencies
        run: npm install --no-audit --no-fund
      - name: Run coverage with floor check
        run: >-
          npx c8
          --check-coverage
          --lines 76
          --branches 67
          --functions 89
          --reporter=text --reporter=lcov
          node scripts/run-tests.cjs --logic-only
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  windows-full:
    name: Full harness (Windows + PowerShell + edge-tts)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: '3.12' }

      - name: Install Python deps (pinned)
        run: python -m pip install --quiet -r requirements.txt

      - name: Install Electron + Terminal Talk
        shell: pwsh
        run: .\install.ps1 -Unattended -HooksYes:$false -StatuslineYes:$false -StartupYes:$false
        continue-on-error: false

      - name: Run full test harness
        run: node scripts/run-tests.cjs --verbose

  # Z2-3 — E2E Playwright on Windows. Full suite of 13 tests covering
  # launch smoke, sessions UI, settings panel, settings persistence.
  # Runs after windows-full so the build step gets primed caches.
  e2e-windows:
    name: E2E (Playwright, windows-latest)
    runs-on: windows-latest
    needs: windows-full
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with: { node-version: '22' }
      - name: Install app devDependencies (Playwright)
        run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Install Electron dependencies for app/
        run: npm install --prefix app --no-audit --no-fund
      - name: Run E2E suite
        run: npx playwright test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: failure()
        with:
          name: playwright-trace
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  # D2-8 — Every action is now pinned to its release SHA with the semver
  # tag in a trailing comment. Dependabot's github-actions ecosystem
  # (.github/dependabot.yml) automatically rewrites both the SHA and
  # the comment together when a new release lands. Re-run the lookup
  # manually with:
  #   gh api repos/actions/checkout/commits/v4 --jq .sha
  # and update the comment to the matching tag from:
  #   gh api repos/actions/checkout/tags --paginate --jq '.[] | select(.commit.sha=="<sha>") | .name'
