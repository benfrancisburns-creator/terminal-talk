name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny everything — each job grants only what it needs.
# Repo-read is enough for the test jobs (they don't push artefacts
# or comments). Hardens against action-malware that tries to exfiltrate
# secrets via GITHUB_TOKEN. Audit F2.
permissions:
  contents: read

jobs:
  pure-logic-tests:
    name: Pure JS tests (cross-platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Run logic-only test subset
        run: node scripts/run-tests.cjs --logic-only --verbose

  windows-full:
    name: Full harness (Windows + PowerShell + edge-tts)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install Python deps (pinned)
        run: python -m pip install --quiet -r requirements.txt

      - name: Install Electron + Terminal Talk
        shell: pwsh
        run: .\install.ps1 -Unattended -HooksYes:$false -StatuslineYes:$false -StartupYes:$false
        continue-on-error: false

      - name: Run full test harness
        run: node scripts/run-tests.cjs --verbose
