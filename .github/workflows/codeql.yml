name: CodeQL

# GitHub's SAST. Runs on every push to main and on all PRs, plus a weekly
# cron so we catch newly published query-pack rules without waiting for
# a code change. Three languages covered:
#   javascript  app/*.js, scripts/*.cjs, tests/e2e/*.ts
#   python      app/*.py (edge-tts, wake-word listener, synth_turn, etc.)
#   actions     .github/workflows/*.yml — CodeQL detects untrusted-input
#               patterns (e.g. un-quoted ${{ github.event.pull_request
#               .head.ref }} injection) that a manual review can miss.
#               Added per audit F5.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 5 * * 1"  # Monday 05:27 UTC

# D2-8 — Node 24 opt-in (see tests.yml for rationale).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Init CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2

      - name: Analyze
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          category: "/language:${{ matrix.language }}"
