<!-- palette — plain ESM replaced with window export -->
<script>
  (function(){
    // 24-arrangement palette: 8 solid + 8 hsplit + 8 vsplit (complementary pairs).
    const BASE_COLOURS = ['#ff5e5e','#ffa726','#ffd93d','#4ade80','#60a5fa','#c084fc','#c97b50','#e0e0e0'];
    const NEUTRAL = '#8a8a8a'; const SIZE = 24;
    const NAMES = ['Red','Orange','Yellow','Green','Blue','Purple','Brown','White'];
    const HEX = { Red:'#ff5e5e', Orange:'#ffa726', Yellow:'#ffd93d', Green:'#4ade80', Blue:'#60a5fa', Purple:'#c084fc', Brown:'#c97b50', White:'#e0e0e0' };
    const HSPLIT_PAIRS = [
      ['Red','Green'],   ['Green','Red'],
      ['Orange','Blue'], ['Blue','Orange'],
      ['Yellow','Purple'], ['Purple','Yellow'],
      ['Brown','White'], ['White','Brown'],
    ];
    const VSPLIT_PAIRS = [
      ['Red','Blue'],   ['Blue','Red'],
      ['Orange','Purple'], ['Purple','Orange'],
      ['Yellow','Brown'], ['Brown','Yellow'],
      ['Green','White'], ['White','Green'],
    ];
    function arrangementForIndex(idx) {
      const i = ((idx % SIZE) + SIZE) % SIZE;
      if (i < 8)  return { kind:'solid',  colours:[BASE_COLOURS[i]] };
      if (i < 16) { const [a,b] = HSPLIT_PAIRS[i-8];  return { kind:'hsplit', colours:[HEX[a], HEX[b]] }; }
      const [a,b] = VSPLIT_PAIRS[i-16]; return { kind:'vsplit', colours:[HEX[a], HEX[b]] };
    }
    function backgroundForArrangement(arr) {
      if (!arr) return NEUTRAL;
      const c = arr.colours;
      if (arr.kind === 'solid')  return c[0];
      if (arr.kind === 'hsplit') return `linear-gradient(to bottom, ${c[0]} 50%, ${c[1]} 50%)`;
      if (arr.kind === 'vsplit') return `linear-gradient(to right,  ${c[0]} 50%, ${c[1]} 50%)`;
      return c[0];
    }
    function primaryColourForArrangement(arr) { return arr && arr.colours ? arr.colours[0] : NEUTRAL; }
    function arrangementLabel(i) {
      if (i < 8)  return NAMES[i];
      if (i < 16) { const [a,b] = HSPLIT_PAIRS[i-8];  return `${a} / ${b} — top/bottom`; }
      const [a,b] = VSPLIT_PAIRS[i-16]; return `${a} / ${b} — left/right`;
    }
    function hashToIndex(s) { let n = 0; for (const c of (s||'')) n += c.charCodeAt(0); return n % SIZE; }
    window.TTPalette = { arrangementForIndex, backgroundForArrangement, primaryColourForArrangement, arrangementLabel, hashToIndex, PALETTE_SIZE: SIZE };
  })();
</script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function shortHex() {
  return Array.from({length:8}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
}

function demoInitialSessions() {
  return {
    'abcd1234': { index: 3,  label: 'Frontend',  session_id: 'abcd1234', pinned: true,  last_seen: Date.now()/1000 },
    'a08f2b71': { index: 12, label: 'Auth API',  session_id: 'a08f2b71', pinned: false, last_seen: Date.now()/1000 },
    '7e5c9a04': { index: 18, label: '',          session_id: '7e5c9a04', pinned: false, last_seen: Date.now()/1000, voice: 'en-US-AriaNeural' },
  };
}

function App() {
  const [settingsOpen, setSettingsOpen] = useState(true);
  const [speed, setSpeed] = useState(1.25);
  const [sessions, setSessions] = useState(demoInitialSessions());
  const [expanded, setExpanded] = useState(new Set(['7e5c9a04']));
  const [queue, setQueue] = useState(() => [
    { id: 'c1', short: 'abcd1234', paletteIndex: 3,  clip: false, heard: false, mtime: Date.now()-20000, duration: 130 },
    { id: 'c2', short: 'a08f2b71', paletteIndex: 12, clip: false, heard: false, mtime: Date.now()-15000, duration: 90 },
    { id: 'c3', short: 'abcd1234', paletteIndex: 3,  clip: true,  heard: false, mtime: Date.now()-10000, duration: 18 },
    { id: 'c4', short: '7e5c9a04', paletteIndex: 18, clip: false, heard: true,  mtime: Date.now()-5000,  duration: 74 },
  ]);
  const [currentId, setCurrentId] = useState('c2');
  const [playing, setPlaying] = useState(true);
  const [currentTime, setCurrentTime] = useState(41);

  // Tick playback when playing
  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => {
      setCurrentTime(t => {
        const cur = queue.find(c => c.id === currentId);
        if (!cur) return t;
        if (t >= cur.duration) { setPlaying(false); return 0; }
        return t + 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [playing, currentId, queue]);

  const actions = {
    playPause: () => setPlaying(p => !p),
    back10: () => setCurrentTime(t => Math.max(0, t - 10)),
    fwd10: () => setCurrentTime(t => t + 10),
    userPlay: (id) => {
      setCurrentId(id); setCurrentTime(0); setPlaying(true);
      setQueue(q => q.map(c => c.id === id ? { ...c, heard: true } : c));
    },
    remove: (id) => setQueue(q => q.filter(c => c.id !== id)),
    clearPlayed: () => setQueue(q => q.filter(c => !c.heard)),
    scrubPreview: (v) => {
      const cur = queue.find(c => c.id === currentId); if (!cur) return;
      setCurrentTime((v/1000) * cur.duration);
    },
    seek: (v) => { const cur = queue.find(c => c.id === currentId); if (!cur) return; setCurrentTime((v/1000) * cur.duration); },
    toggleSettings: () => setSettingsOpen(o => !o),
    hide: () => alert('(demo) would hide the toolbar'),
  };

  const addFakeClip = () => {
    const sessionKeys = Object.keys(sessions);
    const pick = sessionKeys[Math.floor(Math.random() * sessionKeys.length)];
    setQueue(q => [...q, {
      id: 'c' + (q.length + 1) + '-' + Math.random().toString(36).slice(2,5),
      short: pick, paletteIndex: sessions[pick].index,
      clip: Math.random() < 0.3, heard: false,
      mtime: Date.now(), duration: 30 + Math.floor(Math.random() * 120)
    }]);
  };

  const toggleExpand = (shortId) => setExpanded(e => {
    const n = new Set(e); n.has(shortId) ? n.delete(shortId) : n.add(shortId); return n;
  });
  const updateSession = (shortId, entry) => setSessions(s => ({ ...s, [shortId]: entry }));

  return (
    <div className="tt-demo-chrome">
      <Toolbar state={{ queue, currentId, currentTime, playing }} actions={actions} />
      {settingsOpen && (
        <SettingsPanel speed={speed} onSpeedChange={setSpeed}
                       sessions={sessions} expanded={expanded}
                       onToggleSession={toggleExpand} onUpdateSession={updateSession} />
      )}
      <div className="tt-demo-controls">
        <button onClick={addFakeClip}>＋ Add fake clip</button>
        <button onClick={() => { setQueue([]); setCurrentId(null); setPlaying(false); }}>Clear queue</button>
        <button onClick={() => setSettingsOpen(o => !o)}>{settingsOpen ? 'Collapse panel' : 'Expand panel'}</button>
      </div>
      <div className="tt-demo-caption">UI-kit recreation · not wired to real audio · click a dot to replay</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
