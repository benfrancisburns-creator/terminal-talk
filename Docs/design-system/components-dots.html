<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0f1014;font-family:var(--tt-font-ui);color:var(--tt-fg-2)}
  .stage{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
  .cap{font-size:10px;letter-spacing:var(--tt-tracking-caps);text-transform:uppercase;color:var(--tt-fg-5)}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .group{display:flex;flex-direction:column;align-items:center;gap:6px}
  .tok{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tt-fg-5)}
  .dot{width:16px;height:16px;border-radius:50%;cursor:pointer;transition:transform .12s ease,background .3s ease,box-shadow .2s ease}
  .dot.active{width:18px;height:18px;box-shadow:0 0 0 2px rgba(255,255,255,0.35),0 0 10px rgba(255,255,255,0.25);animation:pulse 1.6s ease-in-out infinite}
  .dot.heard{background:rgba(255,255,255,0.9)!important}
  .dot.clip{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;font-weight:700;color:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;padding-bottom:1px}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(255,255,255,0.35),0 0 8px rgba(255,255,255,0.2)}50%{box-shadow:0 0 0 3px rgba(255,255,255,0.55),0 0 14px rgba(255,255,255,0.4)}}
</style>
</head>
<body>
<div class="stage">
  <div class="cap">Dots · solid · hsplit · vsplit · clip (J) · active · heard</div>
  <div class="row">
    <div class="group"><div class="dot" style="background:#ff5e5e"></div><div class="tok">solid</div></div>
    <div class="group"><div class="dot" style="background:#4ade80"></div><div class="tok">solid</div></div>
    <div class="group"><div class="dot" style="background:linear-gradient(to bottom,#ff5e5e 50%,#4ade80 50%)"></div><div class="tok">hsplit</div></div>
    <div class="group"><div class="dot" style="background:linear-gradient(to right,#ffd93d 50%,#c97b50 50%)"></div><div class="tok">vsplit</div></div>
    <div class="group"><div class="dot clip" style="background:#ffd93d">J</div><div class="tok">clip</div></div>
    <div class="group"><div class="dot active" style="background:#60a5fa"></div><div class="tok">active</div></div>
    <div class="group"><div class="dot heard" style="box-shadow:0 0 0 2px #c084fc"></div><div class="tok">heard</div></div>
  </div>
</div>
</body>
</html>
